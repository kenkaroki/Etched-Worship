name: Build Flutter App
on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      app-folder:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: builds-branch
  cancel-in-progress: false

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ inputs.app-folder }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath "${{ inputs.app-name }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ inputs.app-folder }}/${{ inputs.app-name }}.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ inputs.app-folder }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build linux --release

      - name: Package
        run: |
          cd build/linux/x64/release
          # Fixed: 4 levels up to return to the app-folder root
          zip -r ../../../../${{ inputs.app-name }}.zip bundle

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ inputs.app-folder }}/${{ inputs.app-name }}.zip

  build-macos:
    name: macOS
    runs-on: macos-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ inputs.app-folder }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products
          # Fixed: 4 levels up to return to the app-folder root
          zip -r ../../../../${{ inputs.app-name }}.zip Release

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ inputs.app-folder }}/${{ inputs.app-name }}.zip

  publish:
    name: Publish Builds
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build-windows
      - build-linux
      - build-macos

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded
        continue-on-error: true

      - name: Check Successful Builds
        id: check
        run: |
          SUCCESS=0
          [ -f downloaded/windows-build/${{ inputs.app-name }}.zip ] && SUCCESS=1
          [ -f downloaded/linux-build/${{ inputs.app-name }}.zip ] && SUCCESS=1
          [ -f downloaded/macos-build/${{ inputs.app-name }}.zip ] && SUCCESS=1
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT

      - name: Fail If Everything Failed
        if: steps.check.outputs.success == '0'
        run: |
          echo "All platforms failed."
          exit 1

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout Or Create Builds Branch
        run: |
          git fetch origin builds || true
          if git ls-remote --heads origin builds | grep builds; then
            git checkout -B builds origin/builds
          else
            git checkout --orphan builds
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
            mkdir -p latest/windows latest/linux latest/macos history
            touch .gitkeep
            git add .
            git commit -m "Initialize builds branch"
            git push origin builds
            git checkout builds
          fi

      - name: Create History Snapshot
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p history
          if [ -d latest ] && [ "$(find latest -type f 2>/dev/null)" ]; then
            cp -R latest "history/$TIMESTAMP"
          fi

      - name: Update Windows Build
        run: |
          mkdir -p latest/windows
          if [ -f downloaded/windows-build/${{ inputs.app-name }}.zip ]; then
            cp downloaded/windows-build/${{ inputs.app-name }}.zip latest/windows/${{ inputs.app-name }}.zip
            echo "::notice::Windows build updated"
          else
            echo "::warning::Windows build failed"
          fi

      - name: Update Linux Build
        run: |
          mkdir -p latest/linux
          if [ -f downloaded/linux-build/${{ inputs.app-name }}.zip ]; then
            cp downloaded/linux-build/${{ inputs.app-name }}.zip latest/linux/${{ inputs.app-name }}.zip
            echo "::notice::Linux build updated"
          else
            echo "::warning::Linux build failed"
          fi

      - name: Update macOS Build
        run: |
          mkdir -p latest/macos
          if [ -f downloaded/macos-build/${{ inputs.app-name }}.zip ]; then
            cp downloaded/macos-build/${{ inputs.app-name }}.zip latest/macos/${{ inputs.app-name }}.zip
            echo "::notice::macOS build updated"
          else
            echo "::warning::macOS build failed"
          fi

      - name: Keep Latest 10 Histories
        run: |
          mkdir -p history
          cd history
          COUNT=$(ls -1dt */ 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 10 ]; then
            ls -1dt */ | tail -n +11 | xargs rm -rf
          fi

      - name: Build Summary
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          [ -f downloaded/windows-build/${{ inputs.app-name }}.zip ] && echo "✅ Windows" >> $GITHUB_STEP_SUMMARY || echo "⚠ Windows Failed" >> $GITHUB_STEP_SUMMARY
          [ -f downloaded/linux-build/${{ inputs.app-name }}.zip ] && echo "✅ Linux" >> $GITHUB_STEP_SUMMARY || echo "⚠ Linux Failed" >> $GITHUB_STEP_SUMMARY
          [ -f downloaded/macos-build/${{ inputs.app-name }}.zip ] && echo "✅ macOS" >> $GITHUB_STEP_SUMMARY || echo "⚠ macOS Failed" >> $GITHUB_STEP_SUMMARY

      - name: Commit And Push
        run: |
          git add latest history
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          git commit -m "${{ inputs.app-name }} build $TIMESTAMP"
          git push origin builds