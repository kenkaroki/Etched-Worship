# ============================================================
#  .github/workflows/deploy.yml
#
#  DEPLOY TRIGGER — Website CI/CD entry point
#  ──────────────────────────────────────────
#  This is the workflow you configure and think about day-to-day.
#
#  Trigger conditions (ALL must be true):
#    • A push lands on the `main` branch
#    • At least one changed file is inside the `website/` folder
#
#  When both conditions are met, this workflow calls the
#  reusable `publish-ghpages.yml` workflow which handles the
#  actual build + deployment to GitHub Pages.
#
#  Why a separate reusable workflow?
#    Separating the "when to deploy" logic (this file) from the
#    "how to deploy" logic (publish-ghpages.yml) means:
#      - You can manually trigger publish-ghpages.yml from the
#        GitHub UI or another workflow if needed.
#      - The deploy trigger stays clean and easy to modify.
# ============================================================

name: Deploy Website

on:
  push:
    # Only run when pushing to the main branch
    branches:
      - main

    # Only run when files inside the website/ directory have changed.
    # This prevents unnecessary deployments when you push commits
    # that only touch the Flutter app, canvas code, etc.
    paths:
      - 'website/**'

# ── Permissions ──────────────────────────────────────────────
# The reusable workflow needs write access to push to gh-pages.
# We grant it here at the calling workflow level.
permissions:
  contents: write

jobs:
  # ── Job: call the reusable publisher workflow ────────────────
  deploy:
    name: Trigger GitHub Pages deployment
    # `uses` must point to the reusable workflow file using the
    # format: {owner}/{repo}/.github/workflows/{file}@{ref}
    # Using the special `${{ github.ref }}` means "the same
    # branch/tag that triggered this workflow" — so it always
    # uses the version of publish-ghpages.yml on main.
    uses: ./.github/workflows/publish-ghpages.yml

    # Pass the repository token so the called workflow can
    # authenticate with GitHub (for peaceiris/actions-gh-pages)
    secrets: inherit
