<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Base SEO meta — individual pages override title/description -->
		<meta name="description" content="Etched Worship — free, open-source church presentation software for Windows, macOS, and Linux." />

		<!-- Browser chrome colour (matches primary green) -->
		<meta name="theme-color" content="#4CAF50" />

		<!-- Preconnect to Google Fonts for faster load -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

		<!-- Inter font — used throughout the design system -->
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
